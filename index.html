<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plano de Aula Mz - Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com ">
  <link rel="preconnect" href="https://fonts.gstatic.com " crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins :wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f2ff 0%, #e6f7ff 100%);
      color: #1a1d28;
      overflow: hidden;
    }

    #splash-screen {
      text-align: center;
      padding: 20px;
      max-width: 90%;
    }

    .splash-logo {
      font-size: 2.2em;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #6c63ff, #4ecdc4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .splash-icon {
      font-size: 2.5em;
      color: #6c63ff;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    .splash-message {
      font-size: 1.2em;
      font-weight: 500;
      color: #2d3246;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .splash-sub {
      font-size: 0.95em;
      color: #8a8da0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(108, 99, 255, 0.2);
      border-top-color: #6c63ff;
      border-radius: 50%;
      margin: 25px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 
      0%, 100% { transform: translateY(0); } 
      50% { transform: translateY(-10px); } 
    }

    #desktop-message {
      display: none;
      text-align: center;
      padding: 40px 20px;
      max-width: 420px;
    }

    .desktop-icon {
      font-size: 3.5em;
      color: #4ecdc4;
      margin-bottom: 20px;
    }

    .desktop-title {
      font-size: 1.5em;
      font-weight: 700;
      color: #1a1d28;
      margin-bottom: 15px;
    }

    .desktop-text {
      color: #555;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .note {
      background: rgba(108, 99, 255, 0.06);
      border-radius: 10px;
      padding: 15px;
      font-size: 0.9em;
      color: #333;
    }

    /* Banner de convite - estilo bonito */
    .invite-banner {
      display: none;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 0.95em;
      color: #2c3e50;
      border: 2px solid #e67e22;
      animation: fadeInDown 0.5s ease;
    }
    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .invite-banner i {
      color: #e67e22;
      margin-right: 8px;
    }
    .invite-banner strong {
      color: #e67e22;
    }
    .invite-banner .codigo {
      display: inline-block;
      background: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: bold;
      font-family: monospace;
      color: #e67e22;
      margin-top: 4px;
      border: 1px dashed #e67e22;
    }
  </style>
</head>
<body>

  <!-- Tela de carregamento -->
  <div id="splash-screen">
    <div class="splash-icon">
      <i class="fas fa-graduation-cap"></i>
    </div>
    <div class="splash-logo">Plano de Aula Mz</div>
    <div class="splash-message">Carregando recursos educacionais...</div>
    <div class="splash-sub">Aguarde um momento</div>
    <div class="spinner"></div>
  </div>

  <!-- Aviso para desktop -->
  <div id="desktop-message">
    <div class="desktop-icon">
      <i class="fas fa-mobile-alt"></i>
    </div>
    <div class="desktop-title">Versão móvel disponível</div>
    <p class="desktop-text">
      Este aplicativo foi projetado para funcionar em <strong>smartphones e tablets</strong>, 
      garantindo a melhor experiência para professores em campo.
    </p>
    <div class="note">
      📱 Por favor, acesse este link pelo seu celular para baixar o app.
    </div>
  </div>

  <div id="main-content" style="display:none;"></div>

  <script>
    // ============================================
    // 🔒 PROTEÇÃO (silenciosa)
    // ============================================
    (function protect() {
      const forbiddenKeys = ['F12', 'I', 'J', 'U', 'C'];
      
      document.addEventListener('keydown', e => {
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
          (e.ctrlKey && e.key === 'U') ||
          (e.ctrlKey && e.key === 'C' && e.shiftKey)
        ) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      });

      document.addEventListener('contextmenu', e => e.preventDefault());

      if (window.console && window.console.log) {
        const noop = () => {};
        console.log = console.info = console.warn = console.error = noop;
      }

      document.addEventListener('touchstart', e => {
        if (e.touches && e.touches.length > 3) e.preventDefault();
      }, { passive: false });
    })();

    // ============================================
    // 📱 DETECTAR CÓDIGO DE CONVITE NA URL
    // ============================================
    function detectInviteCode() {
      const urlParams = new URLSearchParams(window.location.search);
      const ref = urlParams.get('ref');
      if (ref && ref.length >= 4) {
        return ref.toUpperCase();
      }
      return null;
    }

    // ============================================
    // 💾 SALVAR CÓDIGO NO LOCALSTORAGE (vários lugares)
    // ============================================
    function saveInviteCode(code) {
      if (code) {
        // 🔥 Salva em múltiplos lugares para garantir
        localStorage.setItem('invite_code', code);
        sessionStorage.setItem('invite_code', code);
        document.cookie = `invite_code=${code}; path=/; max-age=86400`;
        
        console.log('✅ Código de convite salvo no localStorage:', code);
        return true;
      }
      return false;
    }

    // ============================================
    // 📱 DETECÇÃO DE DISPOSITIVO
    // ============================================
    function isMobileFriendly() {
      const ua = navigator.userAgent || '';
      return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(ua);
    }

    // ============================================
    // 🚀 INICIALIZAÇÃO PRINCIPAL
    // ============================================
    function init() {
      const splash = document.getElementById('splash-screen');
      const desktopMsg = document.getElementById('desktop-message');

      // 1. DETECTA CÓDIGO DE CONVITE NA URL
      const refCode = detectInviteCode();
      
      // 2. SALVA CÓDIGO NO LOCALSTORAGE (se existir)
      if (refCode) {
        saveInviteCode(refCode);
      }

      // 3. VERIFICA SE É DISPOSITIVO MÓVEL
      if (isMobileFriendly()) {
        // ✅ É móvel: oculta splash e redireciona para download
        splash.style.display = 'none';
        
        // 🔥 Se tem código de convite, passa para o indexautorizado.html
        let url = 'indexautorizado.html';
        if (refCode) {
          url += `?ref=${refCode}`;
        }
        
        // Pequeno delay para garantir que o localStorage foi salvo
        setTimeout(() => {
          window.location.href = url;
        }, 300);
        
      } else {
        // ⚠️ É desktop: mostra aviso gentil
        splash.style.display = 'none';
        desktopMsg.style.display = 'block';
      }
    }

    // Inicia após 1.2s (simulando carregamento)
    setTimeout(init, 1200);
  </script>

</body>
</html>
